name: Sensitive Data Scan

# Blocks commits/PRs that contain personal data captured from live browser sessions:
# - Files that must never be committed (snapshot.txt, references/outlook-ui.md)
# - Real Exchange ItemIDs (structural pattern)
# - Live Outlook mail item URLs (/mail/id/<base64>)
# - company.com addresses or URLs (email/URL pattern — company domain, not a secret)

on:
  push:
  pull_request:

jobs:
  scan:
    name: Scan for personal data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Files that must never be tracked
      # -----------------------------------------------------------------------
      - name: Blocked files must not be committed
        run: |
          blocked=(
            "snapshot.txt"
            "references/outlook-ui.md"
          )
          fail=0
          for f in "${blocked[@]}"; do
            if git ls-files --error-unmatch "$f" 2>/dev/null; then
              echo "::error file=$f::$f must not be committed — it may contain personal data from live browser captures. Add to .gitignore."
              fail=1
            fi
          done
          exit $fail

      # -----------------------------------------------------------------------
      # 2. Exchange ItemIDs — structural pattern, no secrets needed
      #    Real IDs start with AAkALg followed by 25+ base64 chars.
      #    Sanitized placeholders always contain EXAMPLE, PLACEHOLDER, or REDACTED.
      # -----------------------------------------------------------------------
      - name: No live Exchange ItemIDs
        run: |
          # grep -l: print filenames only (never prints the matched content)
          matches=$(grep -rlE "AAkALg[A-Za-z0-9+/%]{25,}" \
            --include="*.md" --include="*.js" --include="*.json" \
            --include="*.sh" --include="*.txt" \
            . 2>/dev/null | grep -v "^\.git/" || true)

          if [ -n "$matches" ]; then
            # Re-check: exclude lines that already have a placeholder marker
            flagged=""
            while IFS= read -r file; do
              if grep -qE "AAkALg[A-Za-z0-9+/%]{25,}" "$file" 2>/dev/null && \
                 grep -E  "AAkALg[A-Za-z0-9+/%]{25,}" "$file" 2>/dev/null \
                   | grep -qvE "(EXAMPLE|PLACEHOLDER|REDACTED|<REDACTED|\.\.\.)"; then
                flagged="$flagged $file"
              fi
            done <<< "$matches"

            if [ -n "$flagged" ]; then
              echo "::error::Real Exchange ItemID found in:$flagged"
              echo "Replace with placeholder: AAkALg...<REDACTED_ITEM_ID>"
              exit 1
            fi
          fi

      # -----------------------------------------------------------------------
      # 3. Live Outlook mail item URLs — /mail/id/<long-base64>
      #    Safe references use example.com or contain REDACTED/PLACEHOLDER.
      # -----------------------------------------------------------------------
      - name: No live Outlook mail item URLs
        run: |
          matches=$(grep -rlE "https://[^/]+/mail/id/[A-Za-z0-9%+/=]{20,}" \
            --include="*.md" --include="*.js" --include="*.json" \
            --include="*.sh" --include="*.txt" \
            . 2>/dev/null | grep -v "^\.git/" || true)

          if [ -n "$matches" ]; then
            flagged=""
            while IFS= read -r file; do
              if grep -E "https://[^/]+/mail/id/[A-Za-z0-9%+/=]{20,}" "$file" 2>/dev/null \
                   | grep -qvE "(example\.com|REDACTED|PLACEHOLDER)"; then
                flagged="$flagged $file"
              fi
            done <<< "$matches"

            if [ -n "$flagged" ]; then
              echo "::error::Live Outlook mail item URL found in:$flagged"
              echo "Replace with: https://mail.example.com/mail/id/AAkALg...<REDACTED_ITEM_ID>"
              exit 1
            fi
          fi

      # -----------------------------------------------------------------------
      # 4. company.com in URLs or email addresses
      #    The company domain is not a secret — it's a public name. Checking for
      #    it catches real email addresses (@company.com) and tenant URLs
      #    (*.company.com) without hardcoding the specific subdomain.
      #    Legitimate code references to company.com as a company name (e.g.
      #    in comments or docs explaining the project) are fine and won't match
      #    the URL/email patterns below.
      # -----------------------------------------------------------------------
      - name: No company.com email addresses or URLs
        run: |
          flagged=""
          while IFS= read -r file; do
            # Match @company.com (email) or https://...company.com (URL)
            if grep -qE "(@|https?://[a-z0-9.-]*)company\.com" "$file" 2>/dev/null; then
              flagged="$flagged $file"
            fi
          done < <(git ls-files | grep -E "\.(md|js|json|sh|txt)$")

          if [ -n "$flagged" ]; then
            echo "::error::company.com email address or URL found in:$flagged"
            echo "Replace email addresses with user@example.com and tenant URLs with https://mail.example.com"
            exit 1
          fi
